spring:
  datasource:
    url: jdbc:h2:file:./data/clawpond;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  security:
    jwt:
      secret: <JWT_SECRET_KEY_CHANGE_ME_1234567890>
      expiration: 86400000

