spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/claw_pond?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: clawpond
    password: change_me
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

app:
  security:
    jwt:
      secret: change_this_to_a_long_random_secret
      expiration: 86400000
